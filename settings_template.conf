#############################################################
#   DVDRip Configuration
#   The following settings and variables should be
#	defined appropriately for the script suite
#	to function properly
#
#   For paths, the ending / or \\ should be omitted
#
#	For variables using {}-sections, those are values
#	of other variables, and change by changing the appropriate
#	other variable.
#
#	Copy this file into the script main directory as
#	a file named settings.conf
#
##############################################################

# The location of the script suite, a base
# directory for all the scripts, such as
# /home/user_home_dir/scripts/dvdrip
scripts_base="/home/${USER}/scripts/dvdrip"

# The drive letter that the dvd to be ripped is in.
# For the drive D: that is to be mapped to /mnt/d this would be
# drive="d"
drive=""

# The same drive as above, but in the Windows-format
# Takes the letter directly from above and just
# converts it to the "D:"-format
drive_win="${drive}:"

# If sudo is needed to mount the dvd and to use the mounting script, 
# add the command to visudo or /etc/sudoers.d/mount_m -file 
# with appropriate usage rights - to streamline the script running process
mountdvd="${scripts_base}/mount_m"

# The place where the dvd drive is to be mounted
# DO NOT CHANGE!
# The script is still hardcoded to use this location (make sure it exists).
mountpoint="/mnt/m"

# These are some temporary or control files
# related to naming the output and how the data
# is passed from one part to another

# If the user wants to insert the naming info
# manually, inserting it to this file in a
# following format will skip the queries in the script:
# ShowName
# seasonnumber
# nextepisodenumber
manualinfofile="${scripts_base}/manualinfo.txt"

# Script internal use for file naming information
titleinfofile="${scripts_base}/titleinfo.txt"
discinfofile="${scripts_base}/discinfo.txt"

# Locations for executable programs
# Must be given in the WSL/Unix-style paths
# Full paths for the Windows-program paths.
# Needs at least paths for vlc.exe, cmd.exe and powershell.exe
vlc_executable="/mnt/c/Program Files/VideoLAN/VLC/vlc.exe"
command_prompt="/mnt/c/Windows/System32/cmd.exe"
powershell="/mnt/c/Windows/System32/WindowsPowerShell/v1.0/powershell.exe"

# Paths for unix-side programs, makemkvcon and ffmpeg, if needed
# Commented out by default, and expects these to be in path.
# (Then these are shorter to write just as commands instead of variables.)

# makemkvcon should be in path, but if not, uncomment and point 
# the line below to it and use the variable in the scripts, instead of the command
# makemkvcon_executable="makemkvcon"

# Same goes for ffmpeg
# ffmpeg_executable="ffmpeg"

# Base path for the final output of the ripping process,
# for example 
# seriesbase="/mnt/d/rips"
seriesbase=""

# Location of the Handbrake presets-file
# as an Unix-style path, for example
# handbr_presets_file="${scripts_base}/user_presets.json"
handbr_presets_file=""

# Which HandBrake preset to use
# (from the file above). Just the preset name, for example
# (The preset file and the preset should be initially created with the HandBrake GUI).
# handbr_preset="my-tv-show-preset"
handbr_preset=""

# The list of languages for HandBrake that are
# ripped, both for audio and subtitles, for example
# langlist="eng,swe,fin"
langlist=""

# Paths for working directories for the script,
# both in the WSL/Unix-side as well as the Windows-side.
# For example:
# workdir_video="/mnt/d/video"
# workdir_video_win="D:\\video"
workdir_video=""
workdir_video_win=""

# For subtitle directories, it is recommended
# to NOT to have the subtitle dir under the videos dir (above),
# since it can cause extra errors during moving and removing files.
# Example:
# workdir_subs="/mnt/d/subs"
# workdir_subs_win="D:\\subs"
workdir_subs=""
workdir_subs_win=""

# The script suite log file location
# For example:
# LOGFILE="${scripts_base}/rip.log"
LOGFILE=""




